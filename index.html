<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wicomico MATP Cert</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07111f; --surface: #0d1a2d; --border: #1a2f4a;
  --text: #e2e8f0; --muted: #4a6080; --accent: #3b82f6;
  --green: #10b981; --red: #ef4444; --purple: #8b5cf6;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
#app { max-width: 700px; margin: 0 auto; padding: 20px; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; margin-bottom: 24px; border-radius: 10px; }
.header-icon { font-size: 24px; }
.header-title { font-size: 16px; font-weight: 700; color: var(--text); }
.header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
input, textarea, select { width: 100%; padding: 9px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 5px; }
.field { margin-bottom: 14px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
.section-title { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.btn { padding: 11px 24px; border-radius: 8px; border: none; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; }
.btn-primary { background: var(--accent); color: white; width: 100%; padding: 14px; font-size: 15px; }
.btn-primary:hover { background: #2563eb; }
.btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
.drop-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all .2s; margin-bottom: 16px; }
.drop-zone:hover { border-color: var(--accent); background: rgba(59,130,246,.05); }
.drop-zone.active { border-color: var(--green); background: rgba(16,185,129,.05); }
.status { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
.status.loading { background: rgba(59,130,246,.15); color: #93c5fd; border: 1px solid rgba(59,130,246,.3); }
.status.success { background: rgba(16,185,129,.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,.3); }
.status.error { background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
.hidden { display: none !important; }
textarea { resize: vertical; font-size: 14px !important; line-height: 1.8 !important; }
.large-field textarea { font-size: 16px !important; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-icon">🏥</div>
    <div>
      <div class="header-title">Wicomico County MATP Cert</div>
      <div class="header-sub">Upload a facesheet to auto-fill the certification form</div>
    </div>
    <button onclick="showScreen('apikey')" style="margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif">🔑 API Key</button>
    <div style="display:none">
    </div>
  </div>

  
  <div id="screen-upload">
    <label for="file-input" class="drop-zone" id="drop-zone" style="cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="font-size:40px;margin-bottom:10px">📋</div>
      <div style="font-size:15px;font-weight:600;color:#cbd5e1;margin-bottom:4px">Drop facesheet PDF here</div>
      <div style="font-size:12px;color:var(--muted)">or click to browse</div>
      <input type="file" id="file-input" accept="application/pdf" style="width:0.1px;height:0.1px;opacity:0;overflow:hidden;position:absolute;z-index:-1">
    </label>
    <div id="upload-status" class="hidden"></div>
  </div>

  <!-- REVIEW SCREEN -->
  <div id="screen-review" class="hidden">
    <div id="review-status" class="hidden"></div>

    <div class="section">
      <div class="section-title">Section 1 — Patient Information</div>
      <div class="grid-2">
        <div class="field"><label>Last Name</label><input id="f-lastName"></div>
        <div class="field"><label>First Name</label><input id="f-firstName"></div>
      </div>
      <div class="grid-3">
        <div class="field"><label>DOB</label><input id="f-dob"></div>
        <div class="field"><label>Height</label><input id="f-height"></div>
        <div class="field"><label>Weight</label><input id="f-weight"></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>EDD (if applicable)</label><input id="f-edd"></div>
        <div class="field"><label>Name of PCP</label><input id="f-pcpName"></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Parent/Guardian Name</label><input id="f-guardianName"></div>
        <div class="field"><label>Parent/Guardian DOB</label><input id="f-guardianDob"></div>
      </div>
      <div class="field"><label>Address</label><input id="f-address"></div>
      <div class="field"><label>City, State, Zip</label><input id="f-cityStateZip"></div>
      <div class="grid-2">
        <div class="field"><label>Building/Facility Name</label><input id="f-facilityName"></div>
        <div class="field"><label>Room/Bed #</label><input id="f-roomBed"></div>
      </div>
      <div class="field"><label>Patient Contact Phone</label><input id="f-patientPhone"></div>
      <div class="grid-2">
        <div class="field"><label>Medical Assistance #</label><input id="f-maNumber"></div>
        <div class="field"><label>Social Security #</label><input id="f-ssn"></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Medicare #</label><input id="f-medicareNumber"></div>
        <div class="field"><label>Other Insurance</label><input id="f-otherInsurance"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Section 2 — Diagnosis & Symptoms (~65 chars per row)</div>
      <div class="grid-2">
        <div>
          <div class="field large-field"><label>Diagnosis Row 1</label><textarea id="f-diagnosisRow1" rows="2"></textarea></div>
          <div class="field large-field"><label>Diagnosis Row 2</label><textarea id="f-diagnosisRow2" rows="2"></textarea></div>
          <div class="field large-field"><label>Diagnosis Row 3</label><textarea id="f-diagnosisRow3" rows="2"></textarea></div>
        </div>
        <div>
          <div class="field large-field"><label>Symptoms Row 1</label><textarea id="f-symptomsRow1" rows="2"></textarea></div>
          <div class="field large-field"><label>Symptoms Row 2</label><textarea id="f-symptomsRow2" rows="2"></textarea></div>
          <div class="field large-field"><label>Symptoms Row 3</label><textarea id="f-symptomsRow3" rows="2"></textarea></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Section 3 — Transport Justification</div>
      <div class="field"><label>Ambulatory Justification</label><textarea id="f-ambJustification" rows="2"></textarea></div>
      <div class="field"><label>Wheelchair Justification</label><textarea id="f-wcJustification" rows="2"></textarea></div>
      <div class="field"><label>MIEMSS Protocol Justification</label><textarea id="f-miemss" rows="2"></textarea></div>
    </div>

    <div class="section">
      <div class="section-title">Section 4 — Provider Certification</div>
      <div class="grid-2">
        <div class="field"><label>Provider Name</label><input id="f-providerName"></div>
        <div class="field"><label>Provider NPI #</label><input id="f-providerNPI"></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Provider Phone</label><input id="f-providerPhone"></div>
        <div class="field"><label>Date Signed</label><input id="f-dateSigned"></div>
      </div>
      <div class="field"><label>Provider Address</label><input id="f-providerAddress"></div>
    </div>

    <button class="btn btn-primary" id="download-btn" onclick="downloadPDF()">⬇ Download Filled PDF</button>
    <div style="text-align:center;margin-top:12px">
      <button onclick="resetApp()" style="background:transparent;border:none;color:var(--muted);font-size:12px;cursor:pointer">↩ Start over</button>
    </div>
  </div>
</div>

function apiHeaders() { return { "Content-Type": "application/json" }; };
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function showStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.className = "status " + type;
  el.textContent = msg;
  el.classList.remove("hidden");
}

function setField(id, val) {
  const el = document.getElementById("f-" + id);
  if (el) el.value = val || "";
}

function getField(id) {
  const el = document.getElementById("f-" + id);
  return el ? el.value.trim() : "";
}

async function callAPI(body) {
  const resp = await fetch("/proxy", {
    method: "POST",
    headers: apiHeaders(),
    body: JSON.stringify(body)
  });
  const text = await resp.text();
  const data = JSON.parse(text);
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return data;
}

async function extractFromFacesheet(b64) {
  const data = await callAPI({
    model: MODEL,
    max_tokens: 2000,
    messages: [{
      role: "user",
      content: [{
        type: "document",
        source: { type: "base64", media_type: "application/pdf", data: b64 }
      }, {
        type: "text",
        text: `Extract patient and provider info from this facesheet. Return ONLY valid JSON with these keys:
lastName, firstName, dob, height, weight, edd, pcpName,
guardianName, guardianDob,
address, cityStateZip,
facilityName, roomBed, patientPhone,
maNumber, ssn, medicareNumber, otherInsurance,
diagnoses (array of strings),
providerName, providerNPI, providerPhone, providerAddress, providerType,
transportMode, transportJustification.
Rules: cityStateZip = city state zip only (no street); address = street only; dob as mm/dd/yyyy.`
      }]
    }]
  });
  const raw = data.content.map(b => b.text || "").join("").replace(/\`\`\`json|\`\`\`/g, "").trim();
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("No JSON in response: " + raw.slice(0, 200));
  return JSON.parse(match[0]);
}

async function generateSymptoms(diagnoses) {
  const data = await callAPI({
    model: MODEL,
    max_tokens: 500,
    messages: [{
      role: "user",
      content: `Given these diagnoses: ${diagnoses.join(", ")}
Generate medical condition symptoms for an MATP transportation cert form.
Return ONLY JSON: {"symptomsRow1":"...","symptomsRow2":"...","symptomsRow3":"..."}
Each row max 65 chars. Be specific and clinical. No ICD codes.`
    }]
  });
  const raw = data.content.map(b => b.text || "").join("").replace(/\`\`\`json|\`\`\`/g, "").trim();
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) return { symptomsRow1: "", symptomsRow2: "", symptomsRow3: "" };
  return JSON.parse(match[0]);
}



async function processFile(file) {
  showScreen("review");
  showStatus("review-status", "⏳ Extracting patient info...", "loading");

  try {
    const b64 = await toBase64(file);
    const extracted = await extractFromFacesheet(b64);

    showStatus("review-status", "⏳ Generating symptoms...", "loading");
    const diagnoses = Array.isArray(extracted.diagnoses) ? extracted.diagnoses : [];
    const symptoms = await generateSymptoms(diagnoses.length ? diagnoses : ["primary diagnosis"]);

    // Populate all fields
    const fields = ["lastName","firstName","dob","height","weight","edd","pcpName",
      "guardianName","guardianDob","address","cityStateZip","facilityName","roomBed",
      "patientPhone","maNumber","ssn","medicareNumber","otherInsurance",
      "providerName","providerNPI","providerPhone","providerAddress","dateSigned"];
    fields.forEach(k => setField(k, extracted[k]));

    // Diagnosis rows
    const dx = diagnoses;
    setField("diagnosisRow1", dx[0] || "");
    setField("diagnosisRow2", dx[1] || "");
    setField("diagnosisRow3", dx[2] || "");

    // Symptom rows
    setField("symptomsRow1", symptoms.symptomsRow1 || "");
    setField("symptomsRow2", symptoms.symptomsRow2 || "");
    setField("symptomsRow3", symptoms.symptomsRow3 || "");

    // Transport
    setField("ambJustification", extracted.transportJustification || "");
    setField("wcJustification", extracted.transportJustification || "");

    document.getElementById("review-status").classList.add("hidden");
  } catch(e) {
    showStatus("review-status", "Extraction failed: " + e.message, "error");
  }
}

async function downloadPDF() {
  const btn = document.getElementById("download-btn");
  btn.disabled = true;
  btn.textContent = "⏳ Generating PDF...";

  try {
    const { PDFDocument, rgb, StandardFonts } = window.PDFLib || PDFLib;
    const pdfBytes = Uint8Array.from(atob(WICOMICO_PDF_B64), c => c.charCodeAt(0));
    const pdfDoc = await PDFDocument.load(pdfBytes);
    const page = pdfDoc.getPages()[0];
    const font = await pdfDoc.embedFont(StandardFonts.Helvetica);

    // All fields to draw: [fieldId, x, y, size, maxWidth]
    const draws = [
      ["edd",             290, 685, 8,  100],
      ["pcpName",         449, 685, 8,  130],
      ["lastName",         68, 662, 8,  120],
      ["firstName",       230, 662, 8,  125],
      ["height",          390, 662, 8,   45],
      ["weight",          468, 662, 8,   45],
      ["dob",             540, 662, 8,   50],
      ["guardianName",     90, 645, 8,  180],
      ["guardianDob",     375, 645, 8,  100],
      ["address",          70, 632, 8,  390],
      ["cityStateZip",     90, 622, 8,  360],
      ["facilityName",     90, 612, 8,  160],
      ["roomBed",         310, 612, 8,   50],
      ["patientPhone",    453, 612, 8,  120],
      ["maNumber",        106, 592, 8,   95],
      ["ssn",             212, 592, 8,   80],
      ["medicareNumber",  340, 592, 8,  115],
      ["otherInsurance",  506, 592, 7,   80],
      ["diagnosisRow1",    26, 495, 7,  265],
      ["diagnosisRow2",    26, 483, 7,  265],
      ["diagnosisRow3",    26, 471, 7,  265],
      ["symptomsRow1",    304, 495, 7,  280],
      ["symptomsRow2",    304, 483, 7,  280],
      ["symptomsRow3",    304, 471, 7,  280],
      ["ambJustification", 21, 415, 7,  470],
      ["wcJustification",  21, 340, 7,  470],
      ["miemss",          240, 305, 7,  340],
      ["dateSigned",      310, 50,  8,   60],
      ["providerNPI",     440, 50,  8,  130],
      ["providerName",     90, 30,  8,   75],
      ["providerPhone",   210, 30,  8,   95],
      ["providerAddress", 365, 30,  7,  215],
    ];

    draws.forEach(([id, x, y, size, maxW]) => {
      let val = getField(id);
      if (!val) return;
      // Truncate to fit maxWidth
      while (val.length > 0 && font.widthOfTextAtSize(val, size) > maxW) {
        val = val.slice(0, -1);
      }
      page.drawText(val, { x, y, size, font, color: rgb(0, 0, 0) });
    });

    const pdfBytesOut = await pdfDoc.save();
    const blob = new Blob([pdfBytesOut], { type: "application/pdf" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const ln = getField("lastName") || "patient";
    a.download = `MATP_Wicomico_${ln}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    showStatus("review-status", "PDF error: " + e.message, "error");
  }

  btn.disabled = false;
  btn.textContent = "⬇ Download Filled PDF";
}

function showScreen(name) {
  ["upload","review"].forEach(s => {
    const el = document.getElementById("screen-" + s);
    if (!el) return;
    if (s === name) {
      el.classList.remove("hidden");
      el.style.display = s === "review" ? "block" : "flex";
    } else {
      el.classList.add("hidden");
      el.style.display = "none";
    }
  });
}

function resetApp() {
  document.getElementById("file-input").value = "";
  document.getElementById("upload-status").classList.add("hidden");
  showScreen("upload");
}

// File input events
document.getElementById("file-input").addEventListener("change", e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
});

const dz = document.getElementById("drop-zone");
dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("active"); });
dz.addEventListener("dragleave", () => dz.classList.remove("active"));
dz.addEventListener("drop", e => {
  e.preventDefault();
  dz.classList.remove("active");
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});

document.addEventListener("DOMContentLoaded", () => { showScreen("upload"); });
  }
  showScreen("upload");
});
</script>
